apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payments
  namespace: argocd
spec:
  project: default

  # Where the Helm chart lives — your gitops repo.
  source:
    # We'll update this to your actual repo path in Step 2.
    repoURL: https://github.com/generalsanjeet/gitops-repo
    targetRevision: HEAD
    path: apps/payments/helm

  # Where to deploy — your Kind cluster.
  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true      # delete k8s resources removed from git
      selfHeal: true   # fix drift if someone manually changes k8s
    syncOptions:
      - CreateNamespace=true
